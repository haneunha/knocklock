<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도감</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #121820; 
            margin: 0;
            color: #e0e0e0;
            user-select: none;
            min-width: 320px;
        }

        #main-container {
            padding: 20px 10px 100px 10px; /* 하단에 정보창이 뜰 공간을 위해 하단 패딩 100px 추가 */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 클릭 가능한 도감 타이틀 설정 */
        #main-title {
            text-align: center;
            font-size: 36px;
            margin-top: 10px;
            margin-bottom: 30px;
            letter-spacing: 5px;
            cursor: pointer; /* 마우스 오버 시 포인터 변경 */
            color: #ff4757; /* 기본값: 빨간색 (선택 모드) */
            transition: color 0.3s ease, transform 0.1s ease;
        }

        #main-title:active {
            transform: scale(0.95); /* 클릭 시 살짝 눌리는 효과 */
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 70px);
            justify-content: center;
            gap: 4px;
            margin-bottom: 40px;
        }

        h2 {
            grid-column: 1 / -1;
            color: #e0e0e0;
            border-left: 5px solid #e0e0e0;
            padding-left: 10px;
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .gallery-grid img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            padding: 8px;
            box-sizing: border-box;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 6px;
            background-color: #202d3b; 
            transition: all 0.15s ease-in-out;
            -webkit-user-drag: none; 
        }

        .gallery-grid img:hover,
        .gallery-grid img:active {
            transform: scale(0.92);
        }

        /* 선택 모드 (다중 선택 - 빨간 테두리) */
        .gallery-grid img.selected {
            border-color: #ff4757 !important;
        }

        /* 정보 모드 (단일 선택 - 초록 테두리) */
        .gallery-grid img.info-selected {
            border-color: #2ecc71 !important;
        }

        /* 하단 정보 패널 스타일 */
        #info-panel {
            position: fixed;
            bottom: -150px; /* 기본적으로 화면 아래로 숨김 */
            left: 0;
            width: 100%;
            background-color: #1a2530;
            border-top: 4px solid #2ecc71;
            color: #e0e0e0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
            transition: bottom 0.3s ease-in-out;
            z-index: 1000;
        }

        /* 정보 패널이 올라올 때 추가되는 클래스 */
        #info-panel.show {
            bottom: 0;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <!-- 타이틀 클릭 시 모드 변경 -->
        <h1 id="main-title" title="클릭하여 모드 전환">도감</h1>
    </div>

    <!-- 하단 정보 패널 -->
    <div id="info-panel">
        여기에 아이템 정보가 표시됩니다.
    </div>

    <script>
        const categories = [
            { title: "음식", folder: "cook", prefix: "cook_", count: 45 },
            { title: "도구", folder: "tool", prefix: "tool_", count: 60 },
            { title: "열쇠", folder: "key", prefix: "key_", count: 11 },
            { title: "잡화", folder: "item", prefix: "item_", count: 109 },
            { title: "요리 재료", folder: "food", prefix: "food_", count: 21 },
            { title: "장신구", folder: "beauty", prefix: "beauty_", count: 15 }
        ];

        const container = document.getElementById('main-container');
        const mainTitle = document.getElementById('main-title');
        const infoPanel = document.getElementById('info-panel');
        
        let savedSelections = JSON.parse(localStorage.getItem('dogamSelections')) || [];

        // 모드 관리 변수 ('select' = 다중 선택, 'info' = 정보 보기)
        let currentMode = 'select'; 
        let currentInfoId = null; // 현재 정보창에 띄워진 아이템 ID

        let isDragging = false;
        let isSelecting = true; 

        // 💡 타이틀 클릭 시 모드 전환 로직
        mainTitle.addEventListener('click', () => {
            if (currentMode === 'select') {
                // 선택 -> 정보 모드로 변경 (초록색)
                currentMode = 'info';
                mainTitle.style.color = '#2ecc71';
            } else {
                // 정보 -> 선택 모드로 복귀 (빨간색)
                currentMode = 'select';
                mainTitle.style.color = '#ff4757';
                
                // 정보 모드 해제 시 띄워져 있던 정보창 닫기 및 초록 테두리 제거
                infoPanel.classList.remove('show');
                currentInfoId = null;
                document.querySelectorAll('.info-selected').forEach(img => {
                    img.classList.remove('info-selected');
                });
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateStorage(id, add) {
            if (add) {
                if (!savedSelections.includes(id)) savedSelections.push(id);
            } else {
                savedSelections = savedSelections.filter(itemId => itemId !== id);
            }
            localStorage.setItem('dogamSelections', JSON.stringify(savedSelections));
        }

        categories.forEach(category => {
            const gridEl = document.createElement('div');
            gridEl.className = 'gallery-grid';
            
            const titleEl = document.createElement('h2');
            titleEl.textContent = category.title;
            gridEl.appendChild(titleEl);
            
            for (let i = 1; i <= category.count; i++) {
                const img = document.createElement('img');
                
                img.src = `img/${category.folder}/${category.prefix}${i}.png`; 
                img.alt = `${category.title} ${i}`;
                const itemId = `${category.prefix}${i}`;
                img.dataset.id = itemId;

                // 새로고침 시 빨간 테두리(다중 선택) 기억
                if (savedSelections.includes(itemId)) {
                    img.classList.add('selected');
                }

                img.ondragstart = () => false;

                img.addEventListener('mousedown', function(e) {
                    if (e.button !== 0) return; 
                    
                    if (currentMode === 'select') {
                        // 🔴 선택 모드 로직 (기존 드래그 다중 선택)
                        isDragging = true;
                        this.classList.toggle('selected');
                        isSelecting = this.classList.contains('selected');
                        updateStorage(this.dataset.id, isSelecting);
                        
                    } else if (currentMode === 'info') {
                        // 🟢 정보 모드 로직 (단일 선택 및 하단 패널 띄우기)
                        if (currentInfoId === this.dataset.id) {
                            // 이미 띄워진 아이템을 한 번 더 누른 경우 -> 정보창 닫기
                            infoPanel.classList.remove('show');
                            this.classList.remove('info-selected');
                            currentInfoId = null;
                        } else {
                            // 새로운 아이템을 누른 경우 -> 기존 것 초기화 후 새 정보 띄우기
                            document.querySelectorAll('.info-selected').forEach(img => img.classList.remove('info-selected'));
                            this.classList.add('info-selected');
                            currentInfoId = this.dataset.id;
                            
                            // 임시 텍스트 생성 (이곳에 실제 데이터나 설명을 연결할 수 있습니다)
                            infoPanel.textContent = `[${category.title}] ${this.alt}의 상세 정보입니다.`;
                            infoPanel.classList.add('show');
                        }
                    }
                });

                img.addEventListener('mouseenter', function() {
                    // 드래그 선택은 오직 'select' 모드일 때만 작동
                    if (currentMode === 'select' && isDragging) {
                        if (isSelecting) {
                            this.classList.add('selected');
                        } else {
                            this.classList.remove('selected');
                        }
                        updateStorage(this.dataset.id, isSelecting);
                    }
                });

                gridEl.appendChild(img);
            }

            container.appendChild(gridEl);
        });
    </script>

</body>
</html>
