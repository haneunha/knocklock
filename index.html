<head>

    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #121820; 
            margin: 0;
            color: #e0e0e0;
            user-select: none;
            min-width: 320px;
        }

        #main-container {
            padding: 20px 10px 100px 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #main-title {
            text-align: center;
            font-size: 36px;
            margin-top: 10px;
            margin-bottom: 30px;
            letter-spacing: 5px;
            cursor: pointer; 
            color: #ff4757; 
            transition: color 0.3s ease, transform 0.1s ease;
        }

        #main-title:active {
            transform: scale(0.95); 
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 70px);
            justify-content: center;
            gap: 4px;
            margin-bottom: 40px;
        }

        h2 {
            grid-column: 1 / -1;
            color: #e0e0e0;
            border-left: 5px solid #e0e0e0;
            padding-left: 10px;
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .gallery-grid img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            padding: 8px;
            box-sizing: border-box;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 6px;
            background-color: #202d3b; 
            transition: all 0.15s ease-in-out;
            -webkit-user-drag: none; 
        }

        .gallery-grid img:hover,
        .gallery-grid img:active {
            transform: scale(0.92);
        }

        .gallery-grid img.selected {
            border-color: #ff4757 !important;
            background-color: #45282a !important; 
        }

        .gallery-grid img.info-selected {
            border-color: #2ecc71 !important;
        }

        #deselect-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #ff4757;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease, opacity 0.2s ease, visibility 0.2s ease;
        }

        #deselect-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.1);
        }

        #deselect-btn.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5); 
        }

        #info-panel {
            position: fixed;
            bottom: -200px;
            left: 0;
            width: 100%;
            margin: 0;
            padding: 0;
            transition: bottom 0.3s ease-in-out;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            filter: drop-shadow(0 -5px 10px rgba(0, 0, 0, 0.5));
        }

        #info-panel.show {
            bottom: 0;
        }

        .info-header {
            position: relative;
            width: 100%;
            height: 45px;
            line-height: 0;
        }

        .info-lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #info-name {
            position: absolute;
            top: 0;
            left: 20px;
            height: 42px;
            line-height: 42px;
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
            white-space: nowrap;
            pointer-events: none;
            margin: 0;
        }

        #info-body {
            background-color: #1a2530; 
            width: 100%;
            padding: 24px 20px; 
            box-sizing: border-box;
            display: flex;
            align-items: center; 
        }

        #info-desc {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.5;
            text-align: left;
            margin: 0;
        }
    </style>
</head>

            "beauty_4": { name: "비틀 언록커", desc: "[서브 퀘스트] '눈이 침침한 지휘관을 위해' 클리어" },
            "beauty_5": { name: "타임러너 기어", desc: "[서브 퀘스트] '시간은 흘러간다' 클리어" },
            "beauty_6": { name: "장기 근속 메달", desc: "[서브 퀘스트] '윤슬을 위한 호신용품' 클리어" },
            "beauty_7": { name: "노크 리본", desc: "[서브 퀘스트] '소비의 심리' 클리어" },
            "beauty_8": { name: "샐러맨더 보구", desc: "[메인 퀘스트] '능동적인 불청객' 클리어" },
            "beauty_9": { name: "젠틀 미믹", desc: "맹규리(1,000노크)" },
            "beauty_10": { name: "에메랄드 헤어콤", desc: "[메인 퀘스트] '매니저를 구하라' 클리어" },
            "beauty_11": { name: "데몬 시냅스", desc: "[메인 퀘스트] '이판 사판에 팔판까지' 클리어" },
            "beauty_12": { name: "루비다일 백", desc: "맹규리(5,000노크)" },
            "beauty_13": { name: "데몬 슈터", desc: "맹규리(1,000노크)" },
            "beauty_14": { name: "칼날 부채", desc: "맹규리(1,000노크)" },
            "beauty_15": { name: "해적왕의 유골", desc: "맹규리(10,000노크)" }
        };

        const container = document.getElementById('main-container');
        const mainTitle = document.getElementById('main-title');
        
        const infoPanel = document.getElementById('info-panel');
        const infoName = document.getElementById('info-name');
        const infoDesc = document.getElementById('info-desc');
        
        const deselectBtn = document.getElementById('deselect-btn'); 
        
        let savedSelections = JSON.parse(localStorage.getItem('dogamSelections')) || [];

        let currentMode = 'select'; 
        let currentInfoId = null; 

        let isDragging = false;
        let isSelecting = true; 
        let lastTouchedElement = null; 

        mainTitle.addEventListener('click', () => {
            if (currentMode === 'select') {
                currentMode = 'info';
                mainTitle.style.color = '#2ecc71';
                deselectBtn.classList.add('hidden'); 
            } else {
                currentMode = 'select';
                mainTitle.style.color = '#ff4757';
                deselectBtn.classList.remove('hidden'); 
                
                infoPanel.classList.remove('show');
                currentInfoId = null;
                document.querySelectorAll('.info-selected').forEach(img => {
                    img.classList.remove('info-selected');
                });
            }
        });

        deselectBtn.addEventListener('click', () => {
            const selectedImages = document.querySelectorAll('img.selected');
            selectedImages.forEach(img => {
                img.classList.remove('selected');
            });
            savedSelections = [];
            localStorage.removeItem('dogamSelections');
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            lastTouchedElement = null;
        });
        window.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchedElement = null;
        });

        function updateStorage(id, add) {
            if (add) {
                if (!savedSelections.includes(id)) savedSelections.push(id);
            } else {
                savedSelections = savedSelections.filter(itemId => itemId !== id);
            }
            localStorage.setItem('dogamSelections', JSON.stringify(savedSelections));
        }

        categories.forEach(category => {
            const gridEl = document.createElement('div');
            gridEl.className = 'gallery-grid';
            
            const titleEl = document.createElement('h2');
            titleEl.textContent = category.title;
            gridEl.appendChild(titleEl);
            
            for (let i = 1; i <= category.count; i++) {
                const img = document.createElement('img');
                
                img.src = `img/${category.folder}/${category.prefix}${i}.png`; 
                const itemId = `${category.prefix}${i}`;
                img.dataset.id = itemId;
                
                const itemInfo = itemData[itemId];
                img.alt = itemInfo ? itemInfo.name : `${category.title} ${i}`;

                if (savedSelections.includes(itemId)) {
                    img.classList.add('selected');
                }

                img.ondragstart = () => false;

                img.addEventListener('pointerdown', function(e) {
                    if (e.pointerType === 'mouse' && e.button !== 0) return; 
                    
                    if (currentMode === 'select') {
                        isDragging = true;
                        this.classList.toggle('selected');
                        isSelecting = this.classList.contains('selected');
                        updateStorage(this.dataset.id, isSelecting);
                        lastTouchedElement = this;
                    }
                });

                img.addEventListener('click', function() {
                    if (currentMode === 'info') {
                        if (currentInfoId === this.dataset.id) {
                            infoPanel.classList.remove('show');
                            this.classList.remove('info-selected');
                            currentInfoId = null;
                        } else {
                            document.querySelectorAll('.info-selected').forEach(img => img.classList.remove('info-selected'));
                            this.classList.add('info-selected');
                            currentInfoId = this.dataset.id;
                            
                            const data = itemData[this.dataset.id];
                            if (data) {
                                infoName.textContent = data.name;
                                infoDesc.textContent = data.desc;
                            } else {
                                infoName.textContent = `알 수 없음`;
                                infoDesc.textContent = `정보가 없습니다.`;
                            }

                            const textWidth = infoName.offsetWidth;
                            const topWidth = textWidth + 40; 
                            const bottomWidth = topWidth + 30; 
                            
                            const bgPath = document.getElementById('info-bg-path');
                            const borderPath = document.getElementById('info-border-path');
                            
                            bgPath.setAttribute('d', `M 0 2 L ${topWidth} 2 L ${bottomWidth} 42 L 0 42 Z`);
                            borderPath.setAttribute('d', `M 0 2 L ${topWidth} 2 L ${bottomWidth} 42`);
                            
                            infoPanel.classList.add('show');
                        }
                    }
                });

                img.addEventListener('pointerenter', function(e) {
                    if (e.pointerType === 'mouse' && currentMode === 'select' && isDragging) {
                        if (isSelecting) {
                            this.classList.add('selected');
                        } else {
                            this.classList.remove('selected');
                        }
                        updateStorage(this.dataset.id, isSelecting);
                    }
                });

                img.addEventListener('touchmove', function(e) {
                    if (currentMode === 'select' && isDragging) {
                        e.preventDefault(); 
                        
                        const touch = e.touches[0];
                        const element = document.elementFromPoint(touch.clientX, touch.clientY);
                        
                        if (element && element.tagName === 'IMG' && element !== lastTouchedElement) {
                            if (isSelecting) {
                                element.classList.add('selected');
                            } else {
                                element.classList.remove('selected');
                            }
                            updateStorage(element.dataset.id, isSelecting);
                            lastTouchedElement = element;
                        }
                    }
                }, { passive: false }); 

                gridEl.appendChild(img);
            }

            container.appendChild(gridEl);
        });
    </script>
